[build]
  command = "npm run build"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"
  # NEXT_PUBLIC_* vars are intentionally bundled into the client JS; secret
  # scanning would otherwise flag them as exposed. Maps key is protected by
  # HTTP-referrer restrictions in Google Cloud, not by secrecy.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_APP_URL,NEXT_PUBLIC_GOOGLE_MAPS_API_KEY,NEXT_PUBLIC_GOOGLE_MAP_ID,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_AUTH_DEV_MODE"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# --- Security headers (apply globally) ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# --- Keep client portal out of search results ---
[[headers]]
  for = "/portal/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

# --- Apex -> www (defense-in-depth; primary domain in Netlify UI also handles this) ---
[[redirects]]
  from = "https://srvcehq.com/*"
  to = "https://www.srvcehq.com/:splat"
  status = 301
  force = true
